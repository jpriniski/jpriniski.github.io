  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          background: #f5f6fa; color: #222; }

  header { background: #1e2a3a; color: #fff; padding: 18px 28px; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header p  { font-size: 0.82rem; color: #aab; margin-top: 3px; }

  /* ── controls bar ── */
  .controls { display: flex; align-items: center; gap: 18px;
               padding: 12px 28px; background: #fff;
               border-bottom: 1px solid #dde; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: #555; }
  .controls select, .controls input[type=number] {
      border: 1px solid #ccd; border-radius: 5px;
      padding: 5px 9px; font-size: 0.85rem; background: #fafafa; }
  .controls input[type=number] { width: 72px; }

  /* ── scenario tabs ── */
  .tab-bar { display: flex; gap: 6px; padding: 14px 28px 0;
              flex-wrap: wrap; background: #f5f6fa; }
  .tab { cursor: pointer; padding: 7px 14px; border-radius: 6px 6px 0 0;
          font-size: 0.82rem; font-weight: 500; border: 1px solid #ccd;
          border-bottom: none; background: #eef; color: #445;
          transition: background 0.15s; }
  .tab:hover { background: #dde; }
  .tab.active { background: #fff; color: #1e2a3a; border-color: #99b; }

  /* ── scenario panel ── */
  .panel { display: none; padding: 0 28px 28px; background: #fff;
            border-top: 2px solid #1e2a3a; }
  .panel.active { display: block; }

  .perspectives { display: grid; grid-template-columns: 1fr 1fr;
                   gap: 12px; margin: 16px 0; }
  .persp-box { border-radius: 7px; padding: 12px 14px; font-size: 0.82rem;
                line-height: 1.5; }
  .persp-a { background: #e8f0fb; border-left: 4px solid #2166ac; }
  .persp-b { background: #fdecea; border-left: 4px solid #d6604d; }
  .persp-label { font-weight: 700; font-size: 0.75rem;
                  text-transform: uppercase; letter-spacing: .04em;
                  margin-bottom: 5px; }

  /* ── table ── */
  .table-wrap { overflow-x: auto; margin-top: 10px; border-radius: 7px;
                 border: 1px solid #dde; }
  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  thead { background: #1e2a3a; color: #fff; }
  thead th { padding: 9px 12px; text-align: left; cursor: pointer;
              white-space: nowrap; user-select: none; }
  thead th:hover { background: #2e3f55; }
  thead th.sort-asc::after  { content: " ▲"; font-size: 0.7em; }
  thead th.sort-desc::after { content: " ▼"; font-size: 0.7em; }
  tbody tr:nth-child(even) { background: #f7f8fc; }
  tbody tr:hover { background: #eef2ff; }
  tbody td { padding: 7px 12px; border-bottom: 1px solid #eee;
              white-space: nowrap; }
  td.hashtag { font-family: monospace; color: #1a3a6a; font-weight: 500;
                white-space: normal; word-break: break-word; min-width: 160px; }
  td.num { text-align: right; }
  td.align { text-align: right; font-family: monospace; }
  .bar-cell { min-width: 80px; }
  .bar-outer { background: #e8e8e8; border-radius: 3px; height: 10px;
                width: 100%; position: relative; overflow: hidden; }
  .bar-inner { height: 100%; border-radius: 3px; position: absolute; left:0; top:0; }

  .persona-dot { display: inline-block; width: 9px; height: 9px;
                  border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .count-strong-a { color: #2166ac; }
  .count-weak-a   { color: #4a90c4; }
  .count-neutral  { color: #777; }
  .count-weak-b   { color: #c47a4a; }
  .count-strong-b { color: #d6604d; }

  .stat-row { font-size: 0.78rem; color: #667; margin-bottom: 4px; }
</style>
</head>

const PERSONA_COLORS = {"Strong A": "#2166ac", "Weak A": "#74add1", "Neutral": "#969696", "Weak B": "#f4a582", "Strong B": "#d6604d"};
const PERSONAS = ["Strong A","Weak A","Neutral","Weak B","Strong B"];

let currentK   = 20;
let sortCol    = "Total";
let sortDir    = -1;   // -1 = desc, 1 = asc
let currentSid = null;

// ── render a single panel ────────────────────────────────────────────────────
function renderPanel(sid) {
  const d    = RAW[sid];
  const rows = d.rows.slice(0, currentK);

  // sort
  rows.sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (typeof av === "string") return sortDir * av.localeCompare(bv);
    return sortDir * (bv - av);
  });

  const maxTotal = Math.max(...d.rows.map(r=>r.Total), 1);

  const perspHtml = `
    <div class="perspectives">
      <div class="persp-box persp-a">
        <div class="persp-label" style="color:#2166ac">Perspective A</div>
        ${escHtml(d.perspective_a)}
      </div>
      <div class="persp-box persp-b">
        <div class="persp-label" style="color:#d6604d">Perspective B</div>
        ${escHtml(d.perspective_b)}
      </div>
    </div>`;

  const cols = ["Hashtag","Total",...PERSONAS,"Mean Alignment"];

  const thead = `<thead><tr>${
    cols.map(c => {
      let cls = c===sortCol ? (sortDir===-1?"sort-desc":"sort-asc") : "";
      return `<th class="${cls}" onclick="setSort('${c}','${sid}')">${c}</th>`;
    }).join("")
  }</tr></thead>`;

  const tbody = rows.map(r => {
    const barW = Math.round(100*(r.Total/maxTotal));
    const align = r["Mean Alignment"];
    const alignStr = (align >= 0 ? "+" : "") + align.toFixed(3);
    const alignColor = align > 0 ? "#2166ac" : align < 0 ? "#d6604d" : "#777";

    const personaCells = PERSONAS.map(p => {
      const cnt = r[p] ?? 0;
      const color = PERSONA_COLORS[p];
      return `<td class="num" style="color:${color};font-weight:600">${cnt}</td>`;
    }).join("");

    return `<tr>
      <td class="hashtag">#${escHtml(r.Hashtag.replace(/^#/,""))}</td>
      <td class="num bar-cell">
        ${r.Total}
        <div class="bar-outer"><div class="bar-inner" style="width:${barW}%;background:#1e2a3a"></div></div>
      </td>
      ${personaCells}
      <td class="align" style="color:${alignColor}">${alignStr}</td>
    </tr>`;
  }).join("");

  const tableHtml = `
    <div class="stat-row">Showing top <strong>${rows.length}</strong> of <strong>${d.rows.length}</strong> unique hashtags · sorted by <em>${sortCol}</em></div>
    <div class="table-wrap">
      <table>
        ${thead}
        <tbody>${tbody}</tbody>
      </table>
    </div>`;

  document.getElementById("content-" + sid).innerHTML = perspHtml + tableHtml;
}

// ── tab switching ─────────────────────────────────────────────────────────────
function showTab(sid) {
  if (currentSid) {
    document.getElementById("panel-" + currentSid).classList.remove("active");
    document.querySelector(`.tab[data-sid="${currentSid}"]`).classList.remove("active");
  }
  currentSid = sid;
  document.getElementById("panel-" + sid).classList.add("active");
  document.querySelector(`.tab[data-sid="${sid}"]`).classList.add("active");
  document.getElementById("scenarioSelect").value = sid;
  renderPanel(sid);
}

// ── sort ──────────────────────────────────────────────────────────────────────
function setSort(col, sid) {
  if (sortCol === col) { sortDir *= -1; }
  else { sortCol = col; sortDir = -1; }
  renderPanel(sid);
}

// ── K input ───────────────────────────────────────────────────────────────────
document.getElementById("kInput").addEventListener("change", function() {
  currentK = Math.max(1, parseInt(this.value) || 20);
  this.value = currentK;
  if (currentSid) renderPanel(currentSid);
});

document.getElementById("scenarioSelect").addEventListener("change", function() {
  showTab(this.value);
});

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── init ──────────────────────────────────────────────────────────────────────
showTab("20-medeng");
</script>
